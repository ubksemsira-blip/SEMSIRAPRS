<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRS Corner</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background: linear-gradient(135deg,#ffd6e0,#cde7ff,#dff5e1);
height:100vh;
overflow-x:hidden;
}

/* ===== Floating Elements ===== */

.cloud{
position:absolute;
background:white;
width:140px;
height:70px;
border-radius:60px;
top:80px;
left:5%;
animation:float 8s ease-in-out infinite;
}

.cloud::after{
content:"";
position:absolute;
background:white;
width:80px;
height:80px;
border-radius:50%;
top:-40px;
left:30px;
}

.bubble{
position:absolute;
width:25px;
height:25px;
background:rgba(255,255,255,0.5);
border-radius:50%;
bottom:-50px;
animation:rise 12s linear infinite;
}

.emoji{
position:absolute;
font-size:28px;
animation:float 6s ease-in-out infinite;
}

/* ===== Navbar ===== */

nav{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(8px);
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
}

/* ===== Hero ===== */

.hero{
text-align:center;
margin-top:40px;
color:#444;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
}

/* ===== Menu Grid ===== */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
background:#fff3c4;
}

.card span{
font-size:40px;
display:block;
margin-bottom:10px;
}

/* ===== Animations ===== */

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-800px);}
}

</style>
</head>

<body>

<!-- Floating -->
<div class="cloud"></div>
<div class="emoji" style="top:150px; right:8%;">😊</div>
<div class="emoji" style="top:300px; left:10%;">😢</div>
<div class="emoji" style="top:500px; right:15%;">😡</div>

<script>
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="bubble";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(8+Math.random()*6)+"s";
document.body.appendChild(b);
}
</script>

<nav>
🌸 PRS CORNER
</nav>

<div class="hero">
<h1>Portal Minda Sihat Pelajar</h1>
<p>Ruang Interaktif Unit Bimbingan & Kaunseling</p>
</div>

<div class="menu">

<div class="card"><span>👥</span>Kenali PRS</div>
<div class="card"><span>😊</span>Semak Mood</div>
<div class="card"><span>🌡️</span>Ujian Stress</div>
<div class="card"><span>💬</span>Luahan Perasaan</div>
<div class="card"><span>🤖</span>Chat Bantuan</div>
<div class="card"><span>🎮</span>Game Emosi</div>
<div class="card"><span>🧠</span>Tips Minda Sihat</div>
<div class="card"><span>📅</span>Tempah Sesi</div>
<div class="card"><span>📸</span>Galeri UBK</div>
<div class="card"><span>🎓</span>Eksplorasi Kerjaya</div>

</div>

</body>
</html>
