<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRS Corner | Unit Bimbingan & Kaunseling</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. Tetapan Asas & Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        /* 2. Header / Banner Utama */
        header {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* 3. Container Kandungan */
        .main-content {
            max-width: 900px;
            margin: -40px auto 40px auto; /* Menaikkan sikit ke atas banner */
            padding: 20px;
            text-align: center;
        }

        .menu-title {
            background: white;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            color: #0083b0;
            font-weight: 700;
        }

        /* 4. Grid Butang Menu */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Gaya Butang Individual */
        .btn {
            background: white;
            color: #444;
            padding: 30px 20px;
            text-decoration: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .btn i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #00b4db;
            transition: transform 0.3s ease;
        }

        /* Efek Hover (Apabila mouse lalu atas butang) */
        .btn:hover {
            transform: translateY(-10px);
            background-color: #00b4db;
            color: white;
            border-color: #00b4db;
            box-shadow: 0 15px 30px rgba(0, 180, 219, 0.3);
        }

        .btn:hover i {
            color: white;
            transform: scale(1.2);
        }

        /* 5. Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 0.9rem;
        }

        /* Responsive untuk skrin kecil (Telefon) */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .btn { padding: 20px; }
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>Selamat Datang ke PRS Corner</h1>
        <p>Unit Bimbingan dan Kaunseling - Sentiasa Bersamamu</p>
    </header>

    <div class="main-content">
        <h2 class="menu-title">Pilih Kategori</h2>

        <div class="button-grid">
            <a href="kenali-prs.html" class="btn">
                <i class="fas fa-id-badge"></i>
                Kenali PRS
            </a>

            <a href="ujian-personality.html" class="btn">
                <i class="fas fa-brain"></i>
                Ujian Personaliti
            </a>

            <a href="tips-minda.html" class="btn">
                <i class="fas fa-heartbeat"></i>
                Tips Minda Sihat
            </a>

            <a href="luahan-perasaan.html" class="btn">
                <i class="fas fa-pencil-alt"></i>
                Ruang Luahan Perasaan
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PRS Corner. Dicipta dengan ❤️ oleh Unit Bimbingan dan Kaunseling.</p>
    </footer>

</body>
</html>
