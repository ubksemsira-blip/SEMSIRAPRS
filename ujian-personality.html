<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Personaliti | PRS Corner</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f9faff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navigasi */
        nav {
            width: 100%;
            background: var(--primary);
            padding: 15px 20px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        /* Container Kuiz */
        .quiz-container {
            max-width: 600px;
            width: 90%;
            background: white;
            margin-top: 40px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        #progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        h2 { color: var(--primary); margin-bottom: 20px; }

        .options-grid {
            display: grid;
            gap: 15px;
            margin-top: 25px;
        }

        .option-btn {
            background: white;
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f4f3ff;
            transform: scale(1.02);
        }

        /* Bahagian Keputusan */
        #result-card {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        .result-box {
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            color: white;
        }

        .huraian-text {
            text-align: left;
            background: #f1f1f1;
            padding: 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> &nbsp; Kembali</a>
    </nav>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <p id="question-number" style="color: #888; font-size: 0.9rem; font-weight: bold;"></p>
            <h2 id="question-text">Pemuatan soalan...</h2>
            
            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="result-card">
            <i class="fas fa-trophy fa-3x" style="color: #f1c40f;"></i>
            <h2>Keputusan Anda!</h2>
            <div id="color-result" class="result-box">
                <h3 id="personality-name">Warna</h3>
            </div>
            <div class="huraian-text" id="personality-desc"></div>
            <br>
            <button onclick="location.reload()" class="option-btn" style="text-align: center; width: 100%; background: var(--primary); color: white;">Cuba Lagi</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Jika rakan anda sedang sedih, apa tindakan anda?",
                options: [
                    { text: "Mendengar luahannya dengan sabar", type: "Biru" },
                    { text: "Menganalisis punca masalahnya", type: "Hijau" },
                    { text: "Mengajak dia buat aktiviti luar untuk lupakan kesedihan", type: "Jingga" },
                    { text: "Memberi nasihat yang tegas dan praktikal", type: "Emas" }
                ]
            },
            {
                q: "Bagaimana anda menguruskan kerja sekolah?",
                options: [
                    { text: "Ikut jadual yang sangat tersusun", type: "Emas" },
                    { text: "Selesaikan perkara yang saya rasa penting dahulu", type: "Biru" },
                    { text: "Tunggu saat akhir baru ada inspirasi", type: "Jingga" },
                    { text: "Kaji dahulu cara paling efisien untuk siapkan", type: "Hijau" }
                ]
            },
            {
                q: "Waktu lapang yang paling best bagi anda ialah...",
                options: [
                    { text: "Membaca buku atau mencari info baru", type: "Hijau" },
                    { text: "Bermain sukan atau aktiviti lasak", type: "Jingga" },
                    { text: "Meluangkan masa berkualiti dengan keluarga/kawan", type: "Biru" },
                    { text: "Mengemas bilik atau merancang aktiviti minggu depan", type: "Emas" }
                ]
            }
        ];

        let currentQuestion = 0;
        let scores = { Biru: 0, Hijau: 0, Jingga: 0, Emas: 0 };

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-number').innerText = `SOALAN ${currentQuestion + 1} / ${questions.length}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.type);
                container.appendChild(btn);
            });

            document.getElementById('progress-fill').style.width = `${((currentQuestion) / questions.length) * 100}%`;
        }

        function selectOption(type) {
            scores[type]++;
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        const descriptions = {
            Biru: {
                name: "Personaliti Biru (Penyayang)",
                color: "#3498db",
                desc: "Anda seorang yang sangat empati, sensitif terhadap perasaan orang lain, dan menghargai hubungan harmoni. Anda sangat sesuai jadi pendengar setia dalam PRS!"
            },
            Hijau: {
                name: "Personaliti Hijau (Pemikir)",
                color: "#2ecc71",
                desc: "Anda seorang yang analitikal, bijak, dan tenang. Anda suka mencari tahu 'mengapa' sesuatu perkara berlaku. Anda penyelesai masalah yang hebat!"
            },
            Jingga: {
                name: "Personaliti Jingga (Aktif)",
                color: "#e67e22",
                desc: "Anda seorang yang berani, suka cabaran, dan spontan! Anda membawa tenaga positif dan keceriaan kepada rakan-rakan di sekeliling anda."
            },
            Emas: {
                name: "Personaliti Emas (Tersusun)",
                color: "#f1c40f",
                desc: "Anda seorang yang bertanggungjawab, setia, dan sangat berdisiplin. Anda suka mengikut peraturan dan memastikan segala tugasan disiapkan dengan sempurna."
            }
        };

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            const resultCard = document.getElementById('result-card');
            resultCard.style.display = 'block';

            // Cari skor tertinggi
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const resBox = document.getElementById('color-result');
            resBox.style.backgroundColor = descriptions[winner].color;
            document.getElementById('personality-name').innerText = descriptions[winner].name;
            document.getElementById('personality-desc').innerText = descriptions[winner].desc;
        }

        loadQuestion();
    </script>

</body>
</html>
